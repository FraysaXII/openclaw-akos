# Vale configuration -- I71 P2 Pack A2 Tier 1 Vale sibling.
#
# Authored 2026-05-14 alongside `scripts/generate_vale_styles.py` per:
#   - .cursor/plans/i71-cicd-discipline-and-aiops-baseline-maturity_a71c0d6e.plan.md §P2 Step 2d
#   - docs/wip/planning/71-cicd-discipline-and-aiops-baseline-maturity/master-roadmap.md §P2
#
# Vale is the open-source NLP + POS-tagging linter; it runs ALONGSIDE the regex
# chassis (`scripts/validate_brand_voice_register.py`), not replacing it. The
# regex catches named violations cheaply + deterministically; Vale catches
# grammar patterns the regex cannot express (e.g., "any superlative-adjective
# in a customer-facing slide H1"). The two are complementary, not redundant.
#
# Severity posture (RATIFIED 2026-05-14 per C-71-Vale-1 inline-ratify verdict):
#   MinAlertLevel = error
#   Override of the prior default (warning + 30-day operator UAT). Operator
#   ratified strict-day-1 matching Pack A1 D-IH-71-F + Pack A3 C-71-2
#   strict-day-1 precedents -- consistent strictness across all I71 P2
#   validator packs avoids the "some packs warn, some packs error" cognitive
#   tax during operator triage of CI failures.
#
# Vocab posture (RATIFIED 2026-05-14 per C-71-Vale-2 inline-ratify verdict):
#   Per-canonical-file Vocab pairs (5 pairs, 10 files total).
#   Override of the prior default (single Holistika / Holistika-rejected pair).
#   Operator ratified per-canonical pairs because each brand canonical is
#   maintained independently (BRAND_LLM_TONE_TELLS.md vs BRAND_FRENCH_PATTERNS.md
#   etc.); colocating each canonical's reject-list with its source makes
#   regeneration on canonical edits more localised + easier to audit which
#   canonical contributes which token to the global reject surface.
#
# Style + Vocab files live under `.vale/styles/` and are GENERATED by
# `scripts/generate_vale_styles.py` from the brand canonicals at
# `docs/references/hlk/v3.0/Admin/O5-1/Marketing/Brand/canonicals/*.md`. Do not
# hand-edit `.vale/styles/Holistika/*.yml` or `.vale/styles/Vocab/*.txt`; edit
# the brand canonicals + regenerate.
#
# Tier 2 (LLM-as-judge advisory layer) is forward-charterd as I78 candidate;
# Tier 3 (writer-facing inline UX) is parked behind team-scale trigger. See:
#   docs/wip/planning/_candidates/i78-brand-voice-llm-judge.md
#   .cursor/plans/i71-cicd-discipline-and-aiops-baseline-maturity_a71c0d6e.plan.md §"Forward-charters"

StylesPath = .vale/styles
MinAlertLevel = error
Vocab = Holistika-CopywritingDiscipline, Holistika-EnglishPatterns, Holistika-LLMToneTells, Holistika-FrenchPatterns, Holistika-SpanishPatterns

[*.md]
BasedOnStyles = Holistika
