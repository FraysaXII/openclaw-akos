# Initiative 45 P6 — Tier B weekly live regression
# Initiative 47 P14 — extended to 4-D matrix: model_tier x persona x scenario_class x judge_axis
#
# Runs once per week (Monday 06:00 UTC) plus on-demand via workflow_dispatch.
#
# ## Matrix dimensions (D-IH-47-H)
#
# - model_tier: cheap | flagship (per D-IH-45-C; from model-prices.json)
# - persona:    OPERATOR | PERSONA-INVESTOR-COLD | PERSONA-INVESTOR-WARM |
#               PERSONA-ADVISOR-REFERRAL | PERSONA-CUSTOMER-KIRBE-PROSPECT
#               (Tier-1 personas + operator; Tier-2/3 only via workflow_dispatch
#               persona_filter input - per D-IH-47-H)
#
# scenario_class and judge_axis are surfaced in scorecard markdown (not matrix
# dimensions), since the eval harness already aggregates by both. Splitting them
# into matrix cells would 7x the runtime without proportional value.
#
# ## Cost-control posture
#
# - MAX_TIER_B_USD env var caps per-run spend (default $5; D-IH-45-D + R-45-3)
# - MAX_PERSONA_USD env var caps per-persona spend in the matrix (default $1; R-47-3)
# - --regression-pp 5.0 hard-fails on any skill regressing >5pp vs cassette baseline
# - --judge-cost-cap 0.01 caps LLM-judge cost per scenario (R-47-11)
# - SKIP gracefully when AKOS_RECORD_LIVE secret not set
#
# Tier A runs continue on every PR via the standard pre_commit profile;
# Tier B is the weekly live LLM smoke / regression layer.

name: eval-tier-b

on:
  schedule:
    # Monday 06:00 UTC (allows post-weekend batch alignment with Anthropic /
    # OpenAI billing windows that flip on UTC midnight)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      max_spend_usd:
        description: 'Max spend per run (USD)'
        required: false
        default: '5.0'
      max_persona_usd:
        description: 'I47 P14: max spend per-persona per matrix cell (USD)'
        required: false
        default: '1.0'
      regression_pp:
        description: 'Hard-fail threshold (pp regression vs cassette baseline)'
        required: false
        default: '5.0'
      skill_filter:
        description: 'Limit to one skill_id (empty = all)'
        required: false
        default: ''
      persona_filter:
        description: 'I47 P14: limit to one persona_id; opt-in to Tier-2/3 personas (empty = Tier-1 + OPERATOR only)'
        required: false
        default: ''
      judge_cost_cap:
        description: 'I47 P14: LLM-judge cost cap per scenario USD (R-47-11; default 0.01)'
        required: false
        default: '0.01'

permissions:
  contents: read

jobs:
  tier-b:
    if: ${{ vars.AKOS_TIER_B_ENABLED == 'true' }}  # Operator opt-in via repo var
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model_tier:
          - cheap     # e.g., openai:gpt-4o-mini
          - flagship  # e.g., anthropic:claude-3-5-sonnet
        persona:
          # I47 P14 (D-IH-47-H): Tier-1 personas + OPERATOR by default.
          # Tier-2/3 personas opt-in via workflow_dispatch persona_filter input.
          - OPERATOR
          - PERSONA-INVESTOR-COLD
          - PERSONA-INVESTOR-WARM
          - PERSONA-ADVISOR-REFERRAL
          - PERSONA-CUSTOMER-KIRBE-PROSPECT
    timeout-minutes: 30   # +10min vs P6 baseline to accommodate persona dim
    env:
      AKOS_RECORD_LIVE: '1'
      MAX_TIER_B_USD: ${{ github.event.inputs.max_spend_usd || '5.0' }}
      MAX_PERSONA_USD: ${{ github.event.inputs.max_persona_usd || '1.0' }}
      AKOS_JUDGE_COST_CAP: ${{ github.event.inputs.judge_cost_cap || '0.01' }}
      AKOS_EVAL_NO_DEPRECATION_WARN: '1'
      # I47 P13 item 4: live writes to compliance.eval_run via service_role
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Per-model API keys come from repo secrets; missing keys cause a clean
      # SKIP (logged) rather than a confusing failure.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Langfuse for trace correlation (optional)
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps (eval + telemetry only; not full GPU toolchain)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Pre-flight - confirm credentials + persona filter
        id: preflight
        run: |
          # I47 P14: persona_filter takes precedence over matrix.persona when set.
          PERSONA="${{ github.event.inputs.persona_filter || matrix.persona }}"
          echo "persona=$PERSONA" >> $GITHUB_OUTPUT
          if [ "${{ matrix.model_tier }}" = "cheap" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY missing; cheap tier will SKIP"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.model_tier }}" = "flagship" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY missing; flagship tier will SKIP"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Tier A baseline (deterministic; runs always)
        run: |
          python scripts/eval.py --mode all \
            --persona "${{ steps.preflight.outputs.persona }}" \
            --json > tier-a-${{ matrix.model_tier }}-${{ matrix.persona }}.json
          python -c "import json; d=json.load(open('tier-a-${{ matrix.model_tier }}-${{ matrix.persona }}.json')); assert d['overall_status']=='pass', f'Tier A baseline regressed: {d[\"overall_status\"]}'; print('Tier A baseline OK')"

      - name: Tier B live regression
        if: steps.preflight.outputs.skip != 'true'
        run: |
          SKILL_ARG=""
          if [ -n "${{ github.event.inputs.skill_filter }}" ]; then
            SKILL_ARG="--replay-skill ${{ github.event.inputs.skill_filter }}"
          fi
          python scripts/eval.py \
            --tier B \
            --mode replay \
            --max-spend $MAX_PERSONA_USD \
            --regression-pp ${{ github.event.inputs.regression_pp || '5.0' }} \
            --persona "${{ steps.preflight.outputs.persona }}" \
            --judge-cost-cap $AKOS_JUDGE_COST_CAP \
            $SKILL_ARG \
            --json > tier-b-${{ matrix.model_tier }}-${{ matrix.persona }}.json
        continue-on-error: false

      - name: Tier B adversarial sweep
        if: steps.preflight.outputs.skip != 'true'
        run: |
          python scripts/eval.py \
            --tier B \
            --mode adversarial \
            --max-spend $MAX_PERSONA_USD \
            --persona "${{ steps.preflight.outputs.persona }}" \
            --judge-cost-cap $AKOS_JUDGE_COST_CAP \
            --json > tier-b-adv-${{ matrix.model_tier }}-${{ matrix.persona }}.json

      - name: Upload scorecards
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecards-${{ matrix.model_tier }}-${{ matrix.persona }}
          path: tier-*-${{ matrix.model_tier }}-${{ matrix.persona }}.json
          retention-days: 90

      - name: Surface failures into job summary
        if: always()
        run: |
          {
            echo "# Tier B (${{ matrix.model_tier }} x ${{ matrix.persona }}) Eval Summary"
            echo ""
            echo "I47 P14 4-D matrix cell: model_tier=${{ matrix.model_tier }} persona=${{ matrix.persona }}"
            echo ""
            for f in tier-*-${{ matrix.model_tier }}-${{ matrix.persona }}.json; do
              if [ -f "$f" ]; then
                echo "## $f"
                python -c "
          import json
          d = json.load(open('$f'))
          print(f'- overall_status: **{d[\"overall_status\"]}**')
          print(f'- elapsed_ms: {d[\"elapsed_ms\"]}')
          print(f'- modes_run: {\", \".join(d[\"modes_run\"])}')
          eval_run = d.get('metadata', {}).get('eval_run_writer', {})
          if eval_run:
              print(f'- compliance.eval_run writes: {eval_run.get(\"written\", 0)} written, {eval_run.get(\"skipped\", 0)} skipped, {eval_run.get(\"errors\", 0)} errors')
          fails = [r for r in d['rows'] if r['status'] == 'FAIL']
          if fails:
              print(f'- {len(fails)} FAIL rows:')
              for r in fails[:10]:
                  print(f'  - \`{r[\"skill_id\"]}\` ({r[\"mode\"]}): {r[\"failures\"]}')
          else:
              print(f'- all {len(d[\"rows\"])} rows green')
          "
              fi
            done
          } >> $GITHUB_STEP_SUMMARY
