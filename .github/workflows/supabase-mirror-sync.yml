# Supabase compliance-mirror sync (R2-03 / DB-01 / D-IH-95-G).
# The "never drift again" backbone: when a canonical CSV changes, regenerate the mirror DML and
# (gated) apply it to Supabase so the T2 mirrors follow the T1 CSV SSOT automatically.
#
# Two-plane doctrine: git CSV = SSOT (T1); Supabase compliance.*_mirror = derived (T2).
#   - emit  (always, no creds): proves the DML generates cleanly + uploads it as an artifact.
#   - apply (gated on the SUPABASE_DB_URL secret): runs the upserts via psql. Skips cleanly if the
#     secret is unset, so the workflow never fails for lack of creds.
#
# Secret required for apply (repo Settings -> Secrets and variables -> Actions):
#   SUPABASE_DB_URL  postgres connection string (service-role / direct or session-pooler), e.g.
#                    postgresql://postgres:<pwd>@db.swrmqpelgoblaquequzb.supabase.co:5432/postgres
name: supabase-mirror-sync

on:
  push:
    branches: [main]
    paths:
      # P95-GOV-3: union of CANONICAL_GOVERNANCE_REGISTRY plane2_workflow_paths (plane2_sync_policy=active)
      - "docs/references/hlk/v3.0/Admin/O5-1/Marketing/Experimentation/canonicals/dimensions/ATTRIBUTION_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Marketing/Reach/canonicals/dimensions/COMMUNICATION_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Marketing/Reach/canonicals/dimensions/CRM_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Marketing/Reach/canonicals/dimensions/EMAIL_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Marketing/Reach/canonicals/dimensions/SCHEDULING_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Operations/RevOps/canonicals/dimensions/BILLING_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Operations/RevOps/canonicals/dimensions/ENGAGEMENT_TEMPLATE_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Operations/RevOps/canonicals/dimensions/REVOPS_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Operations/SMO/canonicals/dimensions/CONTRACT_ADAPTER_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/CYCLE_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/DECISION_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/INITIATIVE_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/OPS_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/REPOSITORY_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/REPO_HEALTH_SNAPSHOT.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/advops/ADVISER_ENGAGEMENT_DISCIPLINES.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/advops/ADVISER_OPEN_QUESTIONS.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/advops/FILED_INSTRUMENTS.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/baseline_organisation.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/ARTIFACT_CLASS_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/AUDIENCE_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/CHANNEL_TOUCHPOINT_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/COMPONENT_PRIMITIVE_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/COUNTRY_WORK_CALENDAR.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/ENGAGEMENT_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/GOI_POI_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/OUTPUT_TYPE_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/PERSONA_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/PERSONA_SCENARIO_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/POLICY_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/PROGRAM_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/SKILL_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/SOURCING_REGISTER.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/TOPIC_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/dimensions/TOUCHPOINT_KIT_CELL_REGISTRY.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/People/Compliance/canonicals/process_list.csv"
      - "docs/references/hlk/v3.0/Admin/O5-1/Research/Intelligence/canonicals/dimensions/INTELLIGENCEOPS_REGISTER.csv"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the emitted DML to Supabase (requires SUPABASE_DB_URL secret)"
        type: boolean
        default: false
      reconcile:
        description: "Full-sync: also DELETE mirror rows whose PK left the CSV (shrinks mirrors to match SSOT). Default ON when applying — derived T2 only."
        type: boolean
        default: true

concurrency:
  group: supabase-mirror-sync
  cancel-in-progress: false

jobs:
  emit-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Preflight — governance registry + emit-contract path parity
        run: |
          python scripts/validate_canonical_governance_registry.py
          python scripts/validate_mirror_emit_contract.py
      - name: Emit mirror DML from canonical CSVs
        run: |
          SHA="$(git rev-parse --short HEAD)"
          python scripts/sync_compliance_mirrors_from_csv.py --output mirror-upsert.sql --git-sha "$SHA"
          # The OPS-86-15 "gap mirrors" (capability / capability_confidence / aic / audience /
          # country_work_calendar) are emitted via a separate path; splice them INTO the same
          # transaction so the full sync covers them too — otherwise capability_registry_mirror
          # (and friends) silently go stale vs the CSV SSOT.
          python scripts/sync_compliance_mirrors_from_csv.py --ops8615-gap-mirrors-only --no-begin-commit --output gap.sql --git-sha "$SHA"
          python - <<'PY'
          from pathlib import Path
          main = Path("mirror-upsert.sql").read_text(encoding="utf-8")
          gap = Path("gap.sql").read_text(encoding="utf-8")
          idx = main.rfind("COMMIT;")
          if idx == -1:
              Path("mirror-upsert.sql").write_text(main + "\n" + gap, encoding="utf-8")
          else:
              Path("mirror-upsert.sql").write_text(
                  main[:idx] + "\n-- ===== OPS-86-15 gap mirrors (spliced into the same txn) =====\n" + gap + "\n" + main[idx:],
                  encoding="utf-8",
              )
          PY
          echo "Emitted mirror-upsert.sql ($(wc -l < mirror-upsert.sql) statements, $(wc -c < mirror-upsert.sql) bytes) at $SHA"
      - name: Delete-reconcile (full-sync; default ON for push + manual apply)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.reconcile != false) }}
        run: |
          # Appends NOT-IN DELETEs (inside the same txn) so each mirror equals its CSV exactly.
          python scripts/emit_mirror_delete_reconcile.py --sql mirror-upsert.sql
      - name: Upload DML artifact (operator review)
        uses: actions/upload-artifact@v4
        with:
          name: mirror-upsert-sql
          path: mirror-upsert.sql
          retention-days: 30
      - name: Pre-flight — mirror enum parity (DATA-08; fail fast BEFORE apply)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_PROJECT_REF: swrmqpelgoblaquequzb
          SUPABASE_POOLER_HOST: aws-0-eu-central-1.pooler.supabase.com
        run: |
          # Two-plane contract guard: checks every emitted enum value against the LIVE mirror
          # CHECK constraints and reports EVERY drift at once, so a CSV enum that outgrew its
          # mirror DDL fails here (with the exact fix ALTER) instead of crashing mid-apply.
          have_url=0
          case "$SUPABASE_DB_URL" in
            postgres://*|postgresql://*) have_url=1 ;;
          esac
          if [ "$have_url" = "0" ] && [ -z "$SUPABASE_PASSWORD" ]; then
            echo "No DB creds - skipping enum parity preflight (emit-only)."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends postgresql-client
          set +e
          python scripts/validate_mirror_enum_parity.py --emit-sql mirror-upsert.sql
          code=$?
          set -e
          if [ "$code" = "1" ]; then
            echo "::error::Mirror enum-parity drift detected — add the CHECK-extension migration shown above before applying."
            exit 1
          fi
          [ "$code" = "2" ] && echo "Parity check skipped (no DB creds) — emit-only run."
          exit 0
      - name: Apply to Supabase (gated on secret)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          # MasterData project (eu-central-1). The pooler is IPv4-reachable from GitHub
          # Actions; the direct host db.<ref>.supabase.co is IPv6-only and will NOT connect
          # from CI — so we build the pooler session-mode URL from SUPABASE_PASSWORD.
          SUPABASE_PROJECT_REF: swrmqpelgoblaquequzb
          SUPABASE_POOLER_HOST: aws-0-eu-central-1.pooler.supabase.com
        run: |
          # SUPABASE_DB_URL is only usable if it is a real postgres URI (psql otherwise
          # treats it as a dbname and tries a local socket). Validate the scheme.
          have_url=0
          case "$SUPABASE_DB_URL" in
            postgres://*|postgresql://*) have_url=1 ;;
          esac
          if [ "$have_url" = "0" ] && [ -z "$SUPABASE_PASSWORD" ]; then
            echo "No usable Supabase secret. Set SUPABASE_DB_URL=postgresql://... (pooler URI) OR SUPABASE_PASSWORD. Emit-only."
            exit 0
          fi
          # On push to main: auto-apply. On manual dispatch: only when apply=true.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.apply }}" != "true" ]; then
            echo "Manual dispatch without apply=true — emit-only."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y postgresql-client
          # --single-transaction + ON_ERROR_STOP=1 = atomic all-or-nothing: any failing
          # statement rolls back the ENTIRE apply, so the mirror is never left half-synced.
          if [ "$have_url" = "1" ]; then
            echo "Applying via SUPABASE_DB_URL (single transaction)…"
            psql "$SUPABASE_DB_URL" --single-transaction -v ON_ERROR_STOP=1 -f mirror-upsert.sql
          else
            # Pooler session mode (port 5432), user postgres.<ref>; PGPASSWORD avoids URI-encoding
            # issues with special chars in the password.
            echo "Applying via SUPABASE_PASSWORD on the pooler (session mode, IPv4-friendly, single transaction)…"
            PGPASSWORD="$SUPABASE_PASSWORD" psql -h "$SUPABASE_POOLER_HOST" -p 5432 -U "postgres.${SUPABASE_PROJECT_REF}" -d postgres --single-transaction -v ON_ERROR_STOP=1 -f mirror-upsert.sql
          fi
          echo "Mirror apply complete."
