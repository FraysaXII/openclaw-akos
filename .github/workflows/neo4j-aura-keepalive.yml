# Neo4j Aura keep-alive (R2-09 / D-IH-95-G).
# Aura FREE auto-pauses after 3 days of no *write* activity (reads don't count) and is
# permanently deleted after 30 days paused. This sends a tiny daily WRITE so the operator's
# instance stays online without manual dashboard resumes. Forward: budget the ~$65/mo Aura
# Professional tier (on-demand pause control + no auto-pause + backups) for production reliability.
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
#   NEO4J_URI       e.g. neo4j+s://<id>.databases.neo4j.io
#   NEO4J_USERNAME  e.g. neo4j
#   NEO4J_PASSWORD  the Aura instance password
name: neo4j-aura-keepalive

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC — well under the 3-day auto-pause window
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install neo4j driver
        run: pip install neo4j
      - name: Write keep-alive ping (counts as Aura activity)
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          python - <<'PY'
          import os, sys
          uri = os.environ.get("NEO4J_URI", "")
          user = os.environ.get("NEO4J_USERNAME", "")
          pwd = os.environ.get("NEO4J_PASSWORD", "")
          if not (uri and user and pwd):
              print("NEO4J_* secrets not set — skipping keep-alive (configure in repo secrets).")
              sys.exit(0)
          from neo4j import GraphDatabase
          driver = GraphDatabase.driver(uri, auth=(user, pwd))
          with driver.session() as s:
              # MERGE+SET is a WRITE -> resets Aura's inactivity timer (reads do not).
              rec = s.run(
                  "MERGE (k:_KeepAlive {id:'aura-keepalive'}) "
                  "SET k.last_ping = datetime(), k.source = 'gh-actions' "
                  "RETURN k.last_ping AS t"
              ).single()
              print("keep-alive write ok; last_ping =", rec["t"])
          driver.close()
          PY
