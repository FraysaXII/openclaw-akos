# I76 LangGraph OSS evaluation spike — real-package proof on ubuntu + repo-pinned Python 3.13.
# Operator visibility: GitHub → Actions → "langgraph-spike-smoke" → job summary + artifact.
# Spike verdict stays FAIL until this workflow is green on main.
name: langgraph-spike-smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "akos/langgraph_spike/**"
      - "scripts/langgraph_spike_run.py"
      - "scripts/validate_research_action.py"
      - "requirements-langgraph-spike.txt"
      - "docs/wip/intelligence/madeira-brand-capability-harmonization-v32-alpha-2026-06-14/source-ledger.csv"
      - ".github/workflows/langgraph-spike-smoke.yml"
  push:
    branches: [main]
    paths:
      - "akos/langgraph_spike/**"
      - "scripts/langgraph_spike_run.py"
      - "requirements-langgraph-spike.txt"
      - ".github/workflows/langgraph-spike-smoke.yml"
  workflow_dispatch:

concurrency:
  group: langgraph-spike-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-graph-spike:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-langgraph-spike.txt

      - name: Install base + LangGraph spike deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-langgraph-spike.txt
          pip install -e .
          python -c "import langgraph; print('langgraph import OK')"

      - name: Run spike (real LangGraph required)
        run: |
          python scripts/langgraph_spike_run.py \
            --json --write-artifact --no-langfuse --require-langgraph \
            | tee langgraph-spike-result.json
          python -c "
          import json, sys
          d = json.load(open('langgraph-spike-result.json'))
          assert d['engine'] == 'langgraph', f\"expected langgraph engine, got {d['engine']}\"
          assert d['status'] == 'PASS', f\"spike status {d['status']}\"
          assert d['research_action_validation'] == 'PASS'
          print('LangGraph spike smoke PASS')
          "

      - name: Pytest spike module
        run: python -m pytest tests/test_langgraph_spike.py -v

      - name: Upload spike evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: langgraph-spike-evidence
          path: |
            langgraph-spike-result.json
            artifacts/langgraph-spike/*.json
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          {
            echo "# LangGraph spike smoke"
            echo ""
            echo "- workflow: \`langgraph-spike-smoke\`"
            echo "- python: \`.python-version\` (3.13)"
            echo "- proof class: real \`langgraph\` package (not mock)"
            echo ""
            if [ -f langgraph-spike-result.json ]; then
              python -c "
          import json
          d = json.load(open('langgraph-spike-result.json'))
          print(f\"- engine: **{d['engine']}**\")
          print(f\"- status: **{d['status']}**\")
          print(f\"- sources_ingested: {d['sources_ingested']}\")
          print(f\"- validation: {d['research_action_validation']}\")
          "
            fi
          } >> $GITHUB_STEP_SUMMARY
