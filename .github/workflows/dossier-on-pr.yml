# Initiative 48 P8 — optional PR comment with dossier executive summary
#
# Opt-in via repo variable AKOS_DOSSIER_ON_PR == 'true' (Settings > Variables).
# Posts a truncated Section 1 markdown snapshot as a PR comment (<=65k chars).

name: dossier-on-pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dossier-comment:
    if: ${{ vars.AKOS_DOSSIER_ON_PR == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build dossier comment body
        run: |
          python scripts/render_uat_dossier.py --mode snapshot --format md --gh-pr-comment --quiet > dossier-comment.md

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('dossier-comment.md', 'utf8').slice(0, 65000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
