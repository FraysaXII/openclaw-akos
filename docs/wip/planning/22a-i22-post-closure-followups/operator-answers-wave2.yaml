# ─── Section 2: Brand voice foundation ───────────────────────────────────────
# ~90 minutes, single sitting. Captures the brand manager's LIVED protocols.
# We do NOT invent brand craft from CSVs — your words become the canonical SSOT.
# The scaffolder writes:
#   v3.0/Admin/O5-1/Marketing/Brand/BRAND_VOICE_FOUNDATION.md
#   v3.0/Admin/O5-1/Marketing/Brand/BRAND_REGISTER_MATRIX.md
#   v3.0/Admin/O5-1/Marketing/Brand/BRAND_DO_DONT.md
#
# Examples are illustrative only — replace with your actual brand voice.

brand_voice:
  voice_charter: "Holistika speaks as the rigorous peer who removes uncertainty without performing expertise."

  archetype: expert_peer

  narrative_pillars:
    - "Evidence over assertion"
    - "Structure that scales"
    - "Plain words, deliberate jargon"

  voice_is:
    # 3 traits with a 1-line example each. Operator-supplied trait #1; #2 and #3
    # derived from narrative pillars (Structure that scales / Plain words) for
    # operator review and refinement.
    - { trait: "Rigorous", example: "We base this decision on the 2026-04-01 fact pattern." }
    - { trait: "Structured", example: "Three options ranked by reversibility. Option A is recommended." }
    - { trait: "Plain", example: "We need to file the constitution before activating Stripe billing." }

  voice_is_not:
    # 3 traits with one thing we'd refuse to say. Operator-supplied trait #1;
    # #2 and #3 are inverses of narrative pillars (Evidence over assertion /
    # Plain words) for operator review and refinement.
    - { trait: "Performative", example: "We are delighted to announce our expert analysis." }
    - { trait: "Vague", example: "We feel this is the right approach overall." }
    - { trait: "Jargon-heavy", example: "Our holistic synergistic methodology paradigmatically de-risks the engagement." }

  register_matrix:
    # (relationship, channel) -> register lookup.
    # Common registers: formal_legal | peer_consulting | casual_internal | regulator_neutral | investor_aspirational
    # Common channels: email | dm | memo | deck | proposal | linkedin_post | slack
    # Add or remove rows as your channels surface; keep the format consistent.
    - { relationship: external_counsel, channel: email,    register: formal_legal }
    - { relationship: peer_founder,     channel: dm,       register: peer_consulting }
    - { relationship: regulator,        channel: memo,     register: regulator_neutral }
    - { relationship: investor,         channel: deck,     register: investor_aspirational }
    - { relationship: client_prospect,  channel: proposal, register: peer_consulting }
    - { relationship: internal_team,    channel: slack,    register: casual_internal }


