# ══════════════════════════════════════════════════════════════════════════════
# Wave-2 operator answers — single source for ALL backfills.
#
# Fill at your pace, in batched sittings. Save. Run:
#     py scripts/wave2_backfill.py --check-only        # sentinel scan, anytime
#     py scripts/wave2_backfill.py --dry-run            # show would-write diff
#     py scripts/wave2_backfill.py                      # full write (refuses if sentinels remain)
#     py scripts/wave2_backfill.py --section programs   # one section only
#
# Sentinels: every __OPERATOR_CONFIRM__ token is rejected by the validator.
# Comment lines (starting with #) are stripped on read; safe to keep notes.
#
# Authority:
#   Wave-2 plan: ~/.cursor/plans/hlk_scalability_wave_2_initiatives_639a02d7.plan.md
#   Backfill discipline: §"Backfill discipline & operator UX" in the plan.
# ══════════════════════════════════════════════════════════════════════════════

meta:
  date_started: 2026-04-29
  operator: __OPERATOR_CONFIRM__   # your name or initials, e.g. "JAR"
  notes: ""                         # free-form; gets attached to the YAML hash record


