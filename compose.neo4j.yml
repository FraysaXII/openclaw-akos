# Optional LOCAL Neo4j Community Edition for HLK graph mirror development.
# Production operators normally use Neo4j Aura; this compose file is not required for Aura.
# Usage: docker compose -f compose.neo4j.yml up -d
#
# Set NEO4J_AUTH in your shell or a local override file (do not commit secrets):
#   NEO4J_AUTH=neo4j/your-password docker compose -f compose.neo4j.yml up -d
#
# Then point ~/.openclaw/.env at bolt://127.0.0.1:7687 with the same credentials.

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
