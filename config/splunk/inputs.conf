# Splunk Universal Forwarder — OpenCLAW Agent Activity Monitoring
# Deploy to: /opt/splunkforwarder/etc/system/local/inputs.conf
# SOP Reference: 6.2, Steps 2-4
#
# NOTE: This path is for Linux production deployments. On Windows dev
# environments, OpenCLAW writes gateway logs to %TEMP%\openclaw\ (e.g.
# C:\Users\<user>\AppData\Local\Temp\openclaw\openclaw-YYYY-MM-DD.log).
# The log-watcher.py script handles both paths automatically via
# tempfile.gettempdir().  For Splunk on Windows, change the monitor path:
#   [monitor://C:\Users\*\AppData\Local\Temp\openclaw\*.log]
#
# For most setups, Langfuse via log-watcher.py is the recommended primary
# observability backend.  Splunk is an optional enterprise SIEM add-on.

[monitor:///opt/openclaw/logs/*.json]
sourcetype = _json
index = ai_agent_ops
disabled = false
